<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CardForge 名片產生器{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Maven+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand" href="/"><i class="bi bi-person-vcard"></i> <span data-i18n="nav.brand">CardForge 名片產生器</span></a>
            <button id="langToggleBtn" class="btn btn-sm btn-outline-light" onclick="toggleLang()">EN</button>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/cardRenderer.js"></script>
    <script src="/static/js/undoManager.js"></script>
    <script src="/static/js/designTab.js"></script>
    <script src="/static/js/listPreview.js"></script>
    <script src="/static/js/employeeCrud.js"></script>
    <script src="/static/js/importManager.js"></script>
    <script src="/static/js/exportManager.js"></script>
    <script src="/static/js/batchOperations.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
